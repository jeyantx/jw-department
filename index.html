<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urapakkam Congregation - Department Assignment</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/duotone/style.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <script>
        if (localStorage.getItem('ss_auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <div class="app">
        <!-- Toolbar -->
        <div class="toolbar no-print">
            <div class="toolbar-left">
                <div class="add-meeting-group">
                    <input type="date" id="meetingDatePicker" class="date-input">
                    <button class="btn btn-primary" onclick="addMeetingFromPicker()">
                        <i class="ph-duotone ph-plus-circle"></i> Add Schedule
                    </button>
                </div>
                <div class="toolbar-divider"></div>
                <label class="conflict-toggle">
                    <input type="checkbox" id="conflictToggle">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    <span class="toggle-label">Conflicts</span>
                </label>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-icon" onclick="saveSchedule()" title="Save"><i class="ph-duotone ph-floppy-disk"></i></button>
                <button class="btn btn-icon" onclick="clearSchedule()" title="Clear"><i class="ph-duotone ph-eraser"></i></button>
                <button class="btn btn-icon" onclick="copyImage()" title="Copy as Image"><i class="ph-duotone ph-copy"></i></button>
                <button class="btn btn-icon" onclick="downloadImage()" title="Download PNG"><i class="ph-duotone ph-download"></i></button>
                <button class="btn btn-icon" onclick="window.print()" title="Print"><i class="ph-duotone ph-printer"></i></button>
                <button class="btn btn-icon" onclick="logout()" title="Logout"><i class="ph-duotone ph-sign-out"></i></button>
            </div>
        </div>

        <!-- Print Header -->
        <div class="print-header">
            <h1>Urapakkam Congregation - Department Assignment</h1>
        </div>

        <!-- Schedule Table -->
        <div class="table-wrapper">
            <table class="schedule-table" id="scheduleTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="empty-state" id="emptyState">
            <i class="ph-duotone ph-calendar-plus"></i>
            <p>Select a date and click <strong>Add Schedule</strong> to begin</p>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
